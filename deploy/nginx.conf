# Nginx site config for syedi-salt.com (Next.js only — no separate backend)
# Copy to: /etc/nginx/sites-available/syedi-salt.com
# Then:    ln -s /etc/nginx/sites-available/syedi-salt.com /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
# SSL:     certbot --nginx -d syedi-salt.com -d www.syedi-salt.com

server {
    listen 80;
    server_name syedi-salt.com www.syedi-salt.com;

    # Redirect www → non-www
    if ($host = www.syedi-salt.com) {
        return 301 http://syedi-salt.com$request_uri;
    }

    # All traffic → Next.js (port 3000)
    # Next.js handles both the frontend pages and the /api/* routes internally.
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
# After running certbot, it automatically adds the HTTPS server block.
